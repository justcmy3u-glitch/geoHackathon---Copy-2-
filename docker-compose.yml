services:

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - georag_internal
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/127.0.0.1/6333
          && printf 'GET /readyz HTTP/1.0\r\n\r\n' >&3
          && grep -q '200 OK' <&3
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password123
      # APOC plugin — load from the official Neo4j Labs URI instead of the
      # deprecated NEO4J_PLUGINS env-var that is ignored in 5.x community
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      # Give the JVM enough heap so startup doesn't time-out
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "128m"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
      - ./neo4j_plugins:/plugins
    networks:
      - georag_internal
    healthcheck:
      # Use cypher-shell (ships in the image) to verify the DB is ready.
      # Falls back to a plain HTTP check so startup failures are visible.
      test:
        - CMD-SHELL
        - |
          cypher-shell -u neo4j -p password123 \
            'RETURN 1 AS ok;' > /dev/null 2>&1 \
          || wget --no-verbose --tries=1 --spider \
               http://localhost:7474 > /dev/null 2>&1
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: georag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - georag_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d georag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
      - ./index:/app/index
      - ./documents:/app/documents
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./models/moondream2:/app/models/moondream2
      - ./secrets:/app/secrets
      - .:/app
    environment:
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_HOST: postgres
      COLAB_API_URL: ${COLAB_TUNNEL_URL}
      COLAB_API_KEY: ${COLAB_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - georag_internal
      - georag_external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  georag_internal:
    driver: bridge
    internal: true
  georag_external:
    driver: bridge
